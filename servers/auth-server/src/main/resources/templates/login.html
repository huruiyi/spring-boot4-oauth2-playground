<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OAuth2 授权服务器</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
</head>
<body>
    <div class="login-container">
        <h1>🔐 OAuth2 登录</h1>
        <p class="subtitle">Spring Boot 4 Authorization Server</p>

        <div class="error-msg" th:if="${param.error}">
            用户名或密码错误
        </div>
        <div class="error-msg" th:if="${param.locked}">
            账户已被锁定，请稍后再试或联系管理员
        </div>
        <div class="error-msg" th:if="${param.ratelimit}">
            登录尝试过于频繁，请稍后再试
        </div>
        <div class="error-msg success-msg" th:if="${param.logout}">
            已成功退出登录
        </div>
        <div class="error-msg success-msg" th:if="${param.registered}">
            注册成功，请登录
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" value="admin" placeholder="请输入用户名" required autofocus />
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" value="password" placeholder="请输入密码" required />
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        <div class="register-link">
            没有账户？<a href="/users/register">去注册</a>
        </div>
    </div>
</body>
</html>
