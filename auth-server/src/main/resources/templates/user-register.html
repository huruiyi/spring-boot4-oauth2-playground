<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - OAuth2 授权服务器</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css" />
</head>
<body>
    <div class="login-container">
        <h1>📝 用户注册</h1>
        <p class="subtitle">创建新账户</p>

        <div class="error-msg" th:if="${error}">
            <span th:text="${error}">错误信息</span>
        </div>

        <form th:action="@{/users/register}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group">
                <label for="username">用户名 *</label>
                <input type="text" id="username" name="username" th:value="${username}" placeholder="请输入用户名" required autofocus />
            </div>
            <div class="form-group">
                <label for="password">密码 *</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required />
            </div>
            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname" th:value="${nickname}" placeholder="请输入昵称" />
            </div>
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" th:value="${email}" placeholder="请输入邮箱" />
            </div>
            <div class="form-group">
                <label for="phone">手机号</label>
                <input type="text" id="phone" name="phone" th:value="${phone}" placeholder="请输入手机号" />
            </div>
            <button type="submit" class="btn-login">注 册</button>
        </form>
        <div class="register-link">
            已有账户？<a href="/login">去登录</a>
        </div>
    </div>
</body>
</html>
