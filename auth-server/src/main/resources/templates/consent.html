<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>授权确认</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; max-width: 480px; width: 100%; }
    h2 { font-size: 20px; margin-bottom: 8px; }
    .sub { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
    .client-badge { display: flex; align-items: center; gap: 12px; background: #f9fafb; padding: 12px 16px; border-radius: 8px; margin-bottom: 24px; }
    .client-icon { width: 40px; height: 40px; border-radius: 8px; background: #1f2937; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
    .client-name { font-weight: 600; }
    .client-id { font-size: 12px; color: #9ca3af; }
    h3 { font-size: 14px; color: #6b7280; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .scope-list { list-style: none; margin-bottom: 16px; }
    .scope-list li { padding: 10px 14px; border-radius: 6px; margin-bottom: 6px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
    .scope-new { background: #fef3c7; }
    .scope-old { background: #f3f4f6; }
    .scope-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .scope-new .scope-dot { background: #f59e0b; }
    .scope-old .scope-dot { background: #d1d5db; }
    .scope-name { font-weight: 600; }
    .scope-desc { color: #6b7280; font-size: 12px; display: block; }
    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn { flex: 1; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; text-align: center; text-decoration: none; }
    .btn-cancel { background: #e5e7eb; color: #374151; }
    .btn-cancel:hover { background: #d1d5db; }
    .btn-approve { background: #1d4ed8; color: #fff; }
    .btn-approve:hover { background: #1e40af; }
    .footer { margin-top: 16px; font-size: 12px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h2>授权确认</h2>
    <p class="sub">以下应用请求访问你的账户数据</p>

    <div class="client-badge">
      <div class="client-icon" th:text="${#strings.substring(clientName, 0, 1)}">A</div>
      <div>
        <div class="client-name" th:text="${clientName}">App Name</div>
        <div class="client-id" th:text="'Client ID: ' + ${clientId}">client-xxx</div>
      </div>
    </div>

    <h3>请求的权限</h3>
    <ul class="scope-list">
      <li th:each="scope : ${scopes}"
          th:class="${newScopes.contains(scope) ? 'scope-new' : 'scope-old'}">
        <span class="scope-dot"></span>
        <span>
          <span class="scope-name" th:text="${scope}">scope</span>
        </span>
        <span th:if="${newScopes.contains(scope)}"
              style="margin-left:auto;font-size:11px;color:#d97706;">新的</span>
        <span th:unless="${newScopes.contains(scope)}"
              style="margin-left:auto;font-size:11px;color:#9ca3af;">已批准</span>
      </li>
    </ul>

    <form method="post" th:action="'/oauth2/authorize'">
      <input type="hidden" name="client_id" th:value="${clientId}">
      <input type="hidden" name="state" th:value="${state}">

      <div class="actions">
        <button type="submit" name="consent_approved" value="false" class="btn btn-cancel">拒绝</button>
        <button type="submit" name="consent_approved" value="true" class="btn btn-approve">批准</button>
      </div>
    </form>

    <div class="footer">
      登录身份：<strong th:text="${principalName}">user</strong>
    </div>
  </div>
</body>
</html>
