<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>授权确认</title>
  <link rel="stylesheet" th:href="@{/css/consent.css}" href="/css/consent.css" />
</head>
<body>
  <div class="card">
    <h2>授权确认</h2>
    <p class="sub">以下应用请求访问你的账户数据</p>

    <div class="client-badge">
      <div class="client-icon" th:text="${#strings.substring(clientName, 0, 1)}">A</div>
      <div>
        <div class="client-name" th:text="${clientName}">App Name</div>
        <div class="client-id" th:text="'Client ID: ' + ${clientId}">client-xxx</div>
      </div>
    </div>

    <h3>请求的权限</h3>
    <ul class="scope-list">
      <li th:each="scope : ${scopes}"
          th:class="${newScopes.contains(scope) ? 'scope-new' : 'scope-old'}">
        <span class="scope-dot"></span>
        <span>
          <span class="scope-name" th:text="${scope}">scope</span>
        </span>
        <span th:if="${newScopes.contains(scope)}" class="scope-status scope-status-new">新的</span>
        <span th:unless="${newScopes.contains(scope)}" class="scope-status scope-status-approved">已批准</span>
      </li>
    </ul>

    <form method="post" th:action="'/oauth2/authorize'">
      <input type="hidden" name="client_id" th:value="${clientId}">
      <input type="hidden" name="state" th:value="${state}">

      <div class="actions">
        <button type="submit" name="consent_approved" value="false" class="btn btn-cancel">拒绝</button>
        <button type="submit" name="consent_approved" value="true" class="btn btn-approve">批准</button>
      </div>
    </form>

    <div class="footer">
      登录身份：<strong th:text="${principalName}">user</strong>
    </div>
  </div>
</body>
</html>
