<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA 验证 - OAuth2 授权服务器</title>
    <link rel="stylesheet" th:href="@{/css/mfa.css}" href="/css/mfa.css" />
</head>
<body>
    <div class="mfa-container">
        <h1>🔐 两步验证</h1>
        <p class="subtitle">请输入 Google Authenticator 生成的验证码</p>

        <div class="error-msg" th:if="${error}">
            <span th:text="${error}">错误信息</span>
        </div>

        <form th:action="@{/mfa/verify}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group">
                <label for="code">验证码</label>
                <input type="text" id="code" name="code" placeholder="请输入 6 位验证码或 8 位恢复码" maxlength="8" required autofocus autocomplete="off" />
            </div>
            <button type="submit" class="btn-verify">验证</button>
        </form>

        <div th:if="${hasRecoveryCodes}" class="recovery-hint">
            <p>💡 无法访问验证器？可输入 8 位恢复码登录</p>
        </div>

        <a href="/logout" class="btn btn-outline">退出登录</a>
    </div>
</body>
</html>
