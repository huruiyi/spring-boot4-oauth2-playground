<!DOCTYPE html>
<html>
<head><title>Silent Refresh</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search)
  const code = params.get('code')
  const error = params.get('error')
  if (code) {
    parent.postMessage({ type: 'oauth2-silent-refresh', code: code }, window.location.origin)
  } else {
    parent.postMessage({ type: 'oauth2-silent-refresh', error: error || 'login_required' }, window.location.origin)
  }
</script>
</body>
</html>
