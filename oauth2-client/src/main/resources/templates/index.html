<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth2 客户端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 8px; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            text-align: left;
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }
        .info code { background: #e8e8e8; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 OAuth2 Client</h1>
        <p class="subtitle">Spring Boot 4 OAuth2 Client Demo</p>
        <a href="/oauth2/authorization/my-client" class="btn">🔐 登录访问受保护页面</a>
        <div class="info">
            <strong>测试账号：</strong><br/>
            用户名: <code>admin</code> / 密码: <code>password</code><br/>
            用户名: <code>user</code> / 密码: <code>password</code><br/><br/>
            <strong>服务端口：</strong><br/>
            Auth Server: <code>localhost:9000</code><br/>
            Resource Server: <code>localhost:9001</code><br/>
            Client App: <code>localhost:8080</code>
        </div>
    </div>
</body>
</html>
